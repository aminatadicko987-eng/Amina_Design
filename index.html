<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amina Design</title>
</head>
<body>

<h1>Bienvenue dans notre projet Amina Design</h1>

<form id="contactForm">
    <div class="form-group">
        <label for="nomClient">Nom du client</label>
        <input type="text" id="nomClient" placeholder="Entrer le nom du client" required>
    </div>

    <div class="form-group">
        <label for="titreProjet">Titre du projet</label>
        <input type="text" id="titreProjet" placeholder="Entrer le titre du projet" required>
    </div>

    <div class="form-group">
        <label for="numeroContact">Numéro de contact</label>
        <input type="text" id="numeroContact" placeholder="Entrer le numéro de contact" required>
    </div>

    <div class="form-group">
        <label for="detailProjet">Détails du projet</label>
        <textarea id="detailProjet" placeholder="Entrer les détails du projet" required></textarea>
    </div>

    <button type="submit">Ajouter</button>
</form>

<ul id="listeContacts"></ul>

<script src="script.js"></script>
</body>
</html>
